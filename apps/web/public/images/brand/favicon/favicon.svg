<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#ffffff"/>

  <!-- Left Palm Tree -->
  <g transform="translate(50, 80)">
    <!-- Trunk -->
    <rect x="18" y="40" width="14" height="50" fill="#d946ef" rx="2"/>
    <!-- Palm fronds -->
    <path d="M 25 35 Q 10 20 5 5" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 25 35 Q 40 20 50 5" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 25 35 Q 15 15 25 0" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Musical Notes Center -->
  <g transform="translate(110, 70)">
    <!-- First note stem -->
    <rect x="0" y="0" width="4" height="50" fill="#d946ef" rx="1"/>
    <!-- First note head -->
    <circle cx="8" cy="55" r="10" fill="#d946ef"/>

    <!-- Second note stem (higher) -->
    <rect x="35" y="20" width="4" height="35" fill="#d946ef" rx="1"/>
    <!-- Second note head -->
    <circle cx="43" cy="60" r="10" fill="#d946ef"/>

    <!-- Connecting beam -->
    <polygon points="4,20 39,20 43,30 8,30" fill="#d946ef"/>
  </g>

  <!-- Right Palm Tree -->
  <g transform="translate(170, 85)">
    <!-- Trunk -->
    <rect x="18" y="35" width="14" height="55" fill="#d946ef" rx="2"/>
    <!-- Palm fronds -->
    <path d="M 25 30 Q 10 15 5 0" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 25 30 Q 40 15 50 0" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 25 30 Q 15 10 25 -5" stroke="#d946ef" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
