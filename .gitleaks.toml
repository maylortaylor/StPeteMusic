title = "StPeteMusic Gitleaks Config"

# Extend the default gitleaks ruleset
[extend]
useDefault = true

# Allow known safe files that may contain placeholder-looking values
[allowlist]
  description = "Safe files and patterns"
  paths = [
    # detect-secrets baseline — stores SHA-256 hashes of detected values, not real secrets
    '''\.secrets\.baseline$''',
    # Docs reference example patterns and commands
    '''docs/AWS_DEPLOYMENT\.md$''',
    '''AWS_SETUP\.md$''',
    '''README\.md$''',
  ]
  regexes = [
    # Ignore placeholder patterns used in docs
    '''YOUR_[A-Z_]+''',
    '''<YOUR_[A-Z_]+>''',
  ]
  # Bypass already-committed findings that cannot be removed from history.
  # Real values have been replaced with placeholders in current files.
  commits = [
    "a4e83b10cb099cc35210520d99dd5aba1628d614",
  ]
