name: OpenTofu Plan

on:
  pull_request:
    paths:
      - 'infrastructure/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write  # required for Workload Identity Federation

jobs:
  tofu-plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '~1.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1082906683227/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: spm-ci-planner@stpetemusic-analytics.iam.gserviceaccount.com

      - name: OpenTofu Init
        id: init
        run: tofu init -backend-config="profile="

      - name: OpenTofu Validate
        id: validate
        run: tofu validate

      - name: OpenTofu Plan
        id: plan
        run: tofu plan -no-color -lock=false -out=tfplan
        continue-on-error: true
        env:
          TF_VAR_github_token:       ${{ secrets.GH_TOKEN_AMPLIFY }}
          TF_VAR_listmonk_username:  ${{ secrets.LISTMONK_USERNAME }}
          TF_VAR_listmonk_password:  ${{ secrets.LISTMONK_PASSWORD }}
          TF_VAR_db_username:        ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:           ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_resend_api_key:        ${{ secrets.RESEND_API_KEY }}
          TF_VAR_clerk_secret_key:      ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TF_VAR_cloudflare_api_token:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_google_project_id:     ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_google_org_id:         ${{ secrets.GCP_ORG_ID }}

      - name: Post Plan to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const workflow = '${{ github.workflow }}';
            const actor = '${{ github.actor }}';
            const output = `#### OpenTofu Plan 📖
            **Init:** \`${initOutcome}\`
            **Validate:** \`${validateOutcome}\`
            **Plan:** \`${planOutcome}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Workflow: \`${workflow}\` | Actor: \`${actor}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
