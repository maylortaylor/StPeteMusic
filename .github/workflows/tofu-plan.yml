name: OpenTofu Plan

on:
  pull_request:
    paths:
      - 'infrastructure/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  tofu-plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '~1.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: OpenTofu Init
        id: init
        run: tofu init -backend-config="profile="

      - name: OpenTofu Validate
        id: validate
        run: tofu validate

      - name: OpenTofu Plan
        id: plan
        run: tofu plan -no-color -out=tfplan
        continue-on-error: true
        env:
          TF_VAR_github_token:       ${{ secrets.GH_TOKEN_AMPLIFY }}
          TF_VAR_listmonk_username:  ${{ secrets.LISTMONK_USERNAME }}
          TF_VAR_listmonk_password:  ${{ secrets.LISTMONK_PASSWORD }}

      - name: Post Plan to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const workflow = '${{ github.workflow }}';
            const actor = '${{ github.actor }}';
            const output = `#### OpenTofu Plan 📖
            **Init:** \`${initOutcome}\`
            **Validate:** \`${validateOutcome}\`
            **Plan:** \`${planOutcome}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Workflow: \`${workflow}\` | Actor: \`${actor}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
