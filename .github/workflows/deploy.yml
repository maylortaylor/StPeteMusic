name: Deploy to AWS

# Runs automatically after CI passes on main.
# 1. Writes the .env file to EC2 from GitHub Secrets (source of truth)
# 2. Syncs workflow files and docker-compose to the EC2 server
# 3. Restarts n8n to apply any changes
#
# IMPORTANT: Never edit ~/stpetemusic/.env on EC2 directly —
# it is overwritten on every deploy. Manage all secrets in:
# https://github.com/maylortaylor/StPeteMusic/settings/secrets/actions
on:
  # Fires after CI passes on a PR merge to main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Fires on any direct push to main (e.g. infra-only commits that don't trigger CI)
  push:
    branches: [main]
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Sync to EC2
    runs-on: ubuntu-latest
    # For workflow_run: only deploy if CI passed. For push/dispatch: always deploy.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          # n8n core
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_ENCRYPTION_KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          # Connectivity
          OBSIDIAN_HOST: ${{ secrets.OBSIDIAN_HOST }}
          # AI APIs
          # Note: ANTHROPIC_API_KEY secret is reused as CLAUDE_API_KEY_N8N_STPETEMUSIC in .env
          CLAUDE_API_KEY_N8N_STPETEMUSIC: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          N8N_GEMINI_API_KEY: ${{ secrets.N8N_GEMINI_API_KEY }}
          # Instagram
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Facebook
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          # YouTube — GOOGLE_CLIENT_ID/SECRET secrets reused for YouTube OAuth
          YOUTUBE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Notion
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Newsletter — Listmonk admin credentials
          LISTMONK_USERNAME: ${{ secrets.LISTMONK_USERNAME }}
          LISTMONK_PASSWORD: ${{ secrets.LISTMONK_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: >-
            POSTGRES_USER,POSTGRES_PASSWORD,DB_ENCRYPTION_KEY,N8N_ENCRYPTION_KEY,
            N8N_API_KEY,OBSIDIAN_HOST,CLAUDE_API_KEY_N8N_STPETEMUSIC,GROQ_API_KEY,
            N8N_GEMINI_API_KEY,IG_USER_ID,IG_APP_ID,IG_ACCESS_TOKEN,FB_PAGE_ID,FB_ACCESS_TOKEN,
            YOUTUBE_CLIENT_ID,YOUTUBE_CLIENT_SECRET,YOUTUBE_API_KEY,NOTION_API_KEY,
            LISTMONK_USERNAME,LISTMONK_PASSWORD
          script: |
            set -e

            echo "── Ensuring git is installed ──"
            command -v git >/dev/null 2>&1 || sudo dnf install git -y -q

            echo "── Pulling latest from GitHub ──"
            cd /tmp
            rm -rf stpetemusic-deploy
            git clone --depth 1 https://github.com/maylortaylor/StPeteMusic.git stpetemusic-deploy

            echo "── Syncing workflow files ──"
            mkdir -p ~/stpetemusic/n8n/workflows/StPeteMusic
            cp -r stpetemusic-deploy/n8n/workflows/StPeteMusic/. ~/stpetemusic/n8n/workflows/StPeteMusic/

            echo "── Syncing docker-compose.prod.yaml ──"
            cp stpetemusic-deploy/n8n/docker-compose.prod.yaml ~/stpetemusic/n8n/docker-compose.prod.yaml

            echo "── Writing .env from GitHub Secrets ──"
            # printf '%s' is used for each value to safely handle special characters
            # (colons, slashes, equals signs) without shell interpretation
            {
              printf 'POSTGRES_USER=%s\n'                    "${POSTGRES_USER}"
              printf 'POSTGRES_PASSWORD=%s\n'                "${POSTGRES_PASSWORD}"
              printf 'DB_ENCRYPTION_KEY=%s\n'                "${DB_ENCRYPTION_KEY}"
              printf 'N8N_ENCRYPTION_KEY=%s\n'               "${N8N_ENCRYPTION_KEY}"
              printf 'N8N_API_KEY=%s\n'                      "${N8N_API_KEY}"
              printf 'OBSIDIAN_HOST=%s\n'                    "${OBSIDIAN_HOST}"
              printf 'CLAUDE_API_KEY_N8N_STPETEMUSIC=%s\n'   "${CLAUDE_API_KEY_N8N_STPETEMUSIC}"
              printf 'GROQ_API_KEY=%s\n'                     "${GROQ_API_KEY}"
              printf 'N8N_GEMINI_API_KEY=%s\n'               "${N8N_GEMINI_API_KEY}"
              printf 'IG_USER_ID=%s\n'                       "${IG_USER_ID}"
              printf 'IG_APP_ID=%s\n'                        "${IG_APP_ID}"
              printf 'IG_ACCESS_TOKEN=%s\n'                  "${IG_ACCESS_TOKEN}"
              printf 'FB_PAGE_ID=%s\n'                       "${FB_PAGE_ID}"
              printf 'FB_ACCESS_TOKEN=%s\n'                  "${FB_ACCESS_TOKEN}"
              printf 'YOUTUBE_CLIENT_ID=%s\n'                "${YOUTUBE_CLIENT_ID}"
              printf 'YOUTUBE_CLIENT_SECRET=%s\n'            "${YOUTUBE_CLIENT_SECRET}"
              printf 'YOUTUBE_API_KEY=%s\n'                  "${YOUTUBE_API_KEY}"
              printf 'NOTION_API_KEY=%s\n'                   "${NOTION_API_KEY}"
              printf 'LISTMONK_USERNAME=%s\n'               "${LISTMONK_USERNAME}"
              printf 'LISTMONK_PASSWORD=%s\n'               "${LISTMONK_PASSWORD}"
            } > ~/stpetemusic/.env
            chmod 600 ~/stpetemusic/.env
            echo "✓ .env written ($(wc -l < ~/stpetemusic/.env) vars)"

            echo "── Ensuring nginx can traverse home dir to serve /media/ ──"
            chmod o+x /home/ec2-user
            mkdir -p ~/stpetemusic/n8n/local-files/videos
            chmod o+x ~/stpetemusic ~/stpetemusic/n8n ~/stpetemusic/n8n/local-files ~/stpetemusic/n8n/local-files/videos

            echo "── Applying compose config (restarts changed containers) ──"
            cd ~/stpetemusic/n8n
            docker-compose -f docker-compose.prod.yaml --env-file ../.env up -d

            echo "── Creating listmonk database if it doesn't exist ──"
            # Wait for postgres to be ready (it should already be running)
            sleep 3
            docker exec stpetemusic-postgres psql -U "${POSTGRES_USER}" \
              -c "CREATE DATABASE listmonk;" 2>/dev/null \
              && echo "✓ listmonk database created" \
              || echo "✓ listmonk database already exists"

            echo "── Setting up nginx for listmonk.stpetemusic.live ──"
            sudo cp /tmp/stpetemusic-deploy/n8n/nginx/listmonk.conf /etc/nginx/conf.d/listmonk.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "✓ nginx config written and reloaded"

            echo "── Requesting SSL cert for listmonk.stpetemusic.live ──"
            # --keep-until-expiring: skips if cert has >30 days left (safe to run on every deploy)
            # Fails gracefully if DNS isn't pointing here yet — HTTP will still work
            sudo certbot --nginx -d listmonk.stpetemusic.live \
              --non-interactive --agree-tos -m TheBurgMusic@gmail.com \
              --keep-until-expiring 2>/dev/null \
              && echo "✓ SSL cert active for listmonk.stpetemusic.live" \
              || echo "⚠ Certbot skipped — add DNS CNAME listmonk → $(curl -s ifconfig.me) in Cloudflare first"

            echo "── Cleanup ──"
            rm -rf /tmp/stpetemusic-deploy

            echo "✓ Deploy complete"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
