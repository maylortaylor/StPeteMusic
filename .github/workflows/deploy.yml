name: Deploy to AWS

# Runs automatically after CI passes on main, on direct pushes to main,
# or manually via workflow_dispatch.
#
# Strategy: checkout repo on the Actions runner, package needed files into
# a single tarball with a known structure, SCP it to EC2, extract and run.
# No git clone on EC2 — avoids DNS resolution issues on the EC2 host.
#
# IMPORTANT: Never edit ~/stpetemusic/.env on EC2 directly —
# it is overwritten on every deploy. Manage all secrets in:
# https://github.com/maylortaylor/StPeteMusic/settings/secrets/actions
on:
  # Fires after CI passes on a PR merge to main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Fires on any direct push to main (e.g. infra-only commits that don't trigger CI)
  push:
    branches: [main]
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

# Prevent two deploys from stomping each other on EC2 (/tmp/deploy-pkg is shared).
# cancel-in-progress: false queues the newer deploy rather than aborting it.
concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync to EC2
    runs-on: ubuntu-latest
    # For workflow_run: only deploy if CI passed. For push/dispatch: always deploy.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Package deployment files
        # Build tarball inside GITHUB_WORKSPACE — scp-action runs in a Docker
        # container that mounts the workspace, so /tmp/ on the runner is not visible.
        run: |
          mkdir -p deploy-pkg/workflows
          cp n8n/docker-compose.prod.yaml deploy-pkg/docker-compose.prod.yaml
          cp n8n/nginx/listmonk.conf      deploy-pkg/listmonk.conf
          cp n8n/nginx/n8n.conf           deploy-pkg/n8n.conf
          cp -r n8n/workflows/StPeteMusic  deploy-pkg/workflows/StPeteMusic
          tar czf deploy.tar.gz -C deploy-pkg .
          echo "✓ deploy.tar.gz built ($(du -sh deploy.tar.gz | cut -f1))"

      - name: Upload deploy package to EC2
        # Use native scp on the host runner (same network env as appleboy/ssh-action).
        # appleboy/scp-action runs inside Docker with broken DNS — host runner works fine.
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            deploy.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.tar.gz
          rm -f /tmp/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_RUN_ID: ${{ github.run_id }}
          # n8n core
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_ENCRYPTION_KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          # Connectivity
          OBSIDIAN_HOST: ${{ secrets.OBSIDIAN_HOST }}
          # AI APIs
          # Note: ANTHROPIC_API_KEY secret is reused as CLAUDE_API_KEY_N8N_STPETEMUSIC in .env
          CLAUDE_API_KEY_N8N_STPETEMUSIC: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          N8N_GEMINI_API_KEY: ${{ secrets.N8N_GEMINI_API_KEY }}
          # Instagram
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Facebook
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          # YouTube — GOOGLE_CLIENT_ID/SECRET secrets reused for YouTube OAuth
          YOUTUBE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Notion
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Listmonk credentials and RDS host are read from SSM on EC2 (not injected here)
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: >-
            DEPLOY_RUN_ID,POSTGRES_USER,POSTGRES_PASSWORD,DB_ENCRYPTION_KEY,N8N_ENCRYPTION_KEY,
            N8N_API_KEY,OBSIDIAN_HOST,CLAUDE_API_KEY_N8N_STPETEMUSIC,GROQ_API_KEY,
            N8N_GEMINI_API_KEY,IG_USER_ID,IG_APP_ID,IG_ACCESS_TOKEN,FB_PAGE_ID,FB_ACCESS_TOKEN,
            YOUTUBE_CLIENT_ID,YOUTUBE_CLIENT_SECRET,YOUTUBE_API_KEY,NOTION_API_KEY
          script: |
            set -e

            # Use a run-specific directory so concurrent deploys cannot stomp each other.
            # DEPLOY_RUN_ID is injected via the envs: list above.
            DEPLOY_DIR="/tmp/deploy-pkg-${DEPLOY_RUN_ID}"
            TARBALL="/tmp/deploy-${DEPLOY_RUN_ID}.tar.gz"

            # Move the tarball from the fixed upload path to the run-specific path.
            mv /tmp/deploy.tar.gz "${TARBALL}"

            echo "── Extracting deploy package ──"
            mkdir -p "${DEPLOY_DIR}"
            tar xzf "${TARBALL}" -C "${DEPLOY_DIR}"
            echo "✓ Extracted: $(find "${DEPLOY_DIR}" -type f | wc -l) files"

            echo "── Syncing workflow files ──"
            mkdir -p ~/stpetemusic/n8n/workflows/StPeteMusic
            cp -r "${DEPLOY_DIR}/workflows/StPeteMusic/." ~/stpetemusic/n8n/workflows/StPeteMusic/

            echo "── Syncing docker-compose.prod.yaml ──"
            cp "${DEPLOY_DIR}/docker-compose.prod.yaml" ~/stpetemusic/n8n/docker-compose.prod.yaml

            echo "── Reading Listmonk credentials from SSM ──"
            LISTMONK_USERNAME=$(aws ssm get-parameter \
              --name "/stpetemusic/listmonk/username" \
              --with-decryption --query 'Parameter.Value' --output text --region us-east-1)
            LISTMONK_PASSWORD=$(aws ssm get-parameter \
              --name "/stpetemusic/listmonk/password" \
              --with-decryption --query 'Parameter.Value' --output text --region us-east-1)
            echo "✓ Listmonk credentials loaded from SSM"

            echo "── Reading RDS host from SSM ──"
            RDS_HOST=$(aws ssm get-parameter \
              --name "/stpetemusic/rds/host" \
              --query 'Parameter.Value' --output text --region us-east-1)
            echo "✓ RDS host: ${RDS_HOST}"

            echo "── Writing .env from GitHub Secrets ──"
            # printf '%s' is used for each value to safely handle special characters
            # (colons, slashes, equals signs) without shell interpretation
            {
              printf 'POSTGRES_USER=%s\n'                    "${POSTGRES_USER}"
              printf 'POSTGRES_PASSWORD=%s\n'                "${POSTGRES_PASSWORD}"
              printf 'DB_ENCRYPTION_KEY=%s\n'                "${DB_ENCRYPTION_KEY}"
              printf 'N8N_ENCRYPTION_KEY=%s\n'               "${N8N_ENCRYPTION_KEY}"
              printf 'N8N_API_KEY=%s\n'                      "${N8N_API_KEY}"
              printf 'OBSIDIAN_HOST=%s\n'                    "${OBSIDIAN_HOST}"
              printf 'CLAUDE_API_KEY_N8N_STPETEMUSIC=%s\n'   "${CLAUDE_API_KEY_N8N_STPETEMUSIC}"
              printf 'GROQ_API_KEY=%s\n'                     "${GROQ_API_KEY}"
              printf 'N8N_GEMINI_API_KEY=%s\n'               "${N8N_GEMINI_API_KEY}"
              printf 'IG_USER_ID=%s\n'                       "${IG_USER_ID}"
              printf 'IG_APP_ID=%s\n'                        "${IG_APP_ID}"
              printf 'IG_ACCESS_TOKEN=%s\n'                  "${IG_ACCESS_TOKEN}"
              printf 'FB_PAGE_ID=%s\n'                       "${FB_PAGE_ID}"
              printf 'FB_ACCESS_TOKEN=%s\n'                  "${FB_ACCESS_TOKEN}"
              printf 'YOUTUBE_CLIENT_ID=%s\n'                "${YOUTUBE_CLIENT_ID}"
              printf 'YOUTUBE_CLIENT_SECRET=%s\n'            "${YOUTUBE_CLIENT_SECRET}"
              printf 'YOUTUBE_API_KEY=%s\n'                  "${YOUTUBE_API_KEY}"
              printf 'NOTION_API_KEY=%s\n'                   "${NOTION_API_KEY}"
              printf 'LISTMONK_USERNAME=%s\n'               "${LISTMONK_USERNAME}"
              printf 'LISTMONK_PASSWORD=%s\n'               "${LISTMONK_PASSWORD}"
              printf 'RDS_HOST=%s\n'                        "${RDS_HOST}"
            } > ~/stpetemusic/.env
            chmod 600 ~/stpetemusic/.env
            echo "✓ .env written ($(wc -l < ~/stpetemusic/.env) vars)"

            echo "── Ensuring nginx can traverse home dir to serve /media/ ──"
            chmod o+x /home/ec2-user
            mkdir -p ~/stpetemusic/n8n/local-files/videos
            chmod o+x ~/stpetemusic ~/stpetemusic/n8n ~/stpetemusic/n8n/local-files ~/stpetemusic/n8n/local-files/videos

            echo "── Fixing host DNS so Docker can reach Docker Hub ──"
            # daemon.json 'dns' only controls container DNS, NOT the daemon's own DNS for
            # image pulls. The daemon reads /etc/resolv.conf, which EC2 sets to 100.100.100.100.
            echo -e "nameserver 8.8.8.8\nnameserver 8.8.4.4" | sudo tee /etc/resolv.conf > /dev/null
            echo '{"dns": ["8.8.8.8", "8.8.4.4"]}' | sudo tee /etc/docker/daemon.json > /dev/null
            sudo systemctl restart docker
            sleep 8
            echo "✓ Host DNS and Docker daemon configured"

            echo "── Applying compose config (restarts changed containers) ──"
            cd ~/stpetemusic/n8n
            docker-compose -f docker-compose.prod.yaml --env-file ../.env up -d

            echo "── Creating listmonk_stpetemusic database on RDS if needed ──"
            docker run --rm \
              -e PGPASSWORD="${POSTGRES_PASSWORD}" \
              postgres:16-alpine \
              psql -h "${RDS_HOST}" -U "${POSTGRES_USER}" -d n8n \
              -c "CREATE DATABASE listmonk_stpetemusic;" 2>/dev/null \
              && echo "✓ listmonk_stpetemusic database created" \
              || echo "✓ listmonk_stpetemusic database already exists"

            echo "── Waiting for Listmonk to be ready (up to 60s) ──"
            for i in $(seq 1 20); do
              curl -sf http://localhost:9000/api/health > /dev/null 2>&1 && break
              sleep 3
            done

            echo "── Bootstrapping default mailing list ──"
            LIST_COUNT=$(curl -sf -u "${LISTMONK_USERNAME}:${LISTMONK_PASSWORD}" \
              http://localhost:9000/api/lists \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['total'])" \
              2>/dev/null || echo "0")
            if [ "${LIST_COUNT}" = "0" ]; then
              curl -sf -X POST -u "${LISTMONK_USERNAME}:${LISTMONK_PASSWORD}" \
                -H "Content-Type: application/json" \
                http://localhost:9000/api/lists \
                -d '{"name":"StPeteMusic Newsletter","type":"public","optin":"single","tags":["newsletter"]}' \
                && echo "✓ Default mailing list created (ID=1)" \
                || echo "⚠ Could not create mailing list — Listmonk may still be starting"
            else
              echo "✓ Mailing list already exists (${LIST_COUNT} found)"
            fi

            echo "── Setting up nginx for listmonk.stpetemusic.live ──"
            sudo cp "${DEPLOY_DIR}/listmonk.conf" /etc/nginx/conf.d/listmonk.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "✓ nginx config written and reloaded"

            echo "── Requesting SSL cert for listmonk.stpetemusic.live ──"
            sudo certbot --nginx -d listmonk.stpetemusic.live \
              --non-interactive --agree-tos -m TheBurgMusic@gmail.com \
              --reinstall 2>/dev/null \
              && echo "✓ SSL cert active for listmonk.stpetemusic.live" \
              || echo "⚠ Certbot skipped — DNS for listmonk.stpetemusic.live may not be set yet"

            echo "── Setting up nginx for n8n.stpetemusic.live ──"
            sudo cp "${DEPLOY_DIR}/n8n.conf" /etc/nginx/conf.d/n8n.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "✓ n8n nginx config written and reloaded"

            echo "── Requesting SSL cert for n8n.stpetemusic.live ──"
            sudo certbot --nginx -d n8n.stpetemusic.live \
              --non-interactive --agree-tos -m TheBurgMusic@gmail.com \
              --reinstall 2>/dev/null \
              && echo "✓ SSL cert active for n8n.stpetemusic.live" \
              || echo "⚠ Certbot skipped — DNS for n8n.stpetemusic.live may not be set yet"

            echo "── Cleanup ──"
            rm -rf "${DEPLOY_DIR}" "${TARBALL}"

            echo "✓ Deploy complete"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
