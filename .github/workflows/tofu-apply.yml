name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  contents: read
  id-token: write  # required for Google Workload Identity Federation

# Shares the same concurrency group as deploy.yml so tofu-apply and deploy
# never run simultaneously. If both fire on the same push (infra + app changes),
# tofu-apply runs first (instance type change, etc.), then deploy SSH runs safely.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  tofu-apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '~1.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1082906683227/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: spm-ci-planner@stpetemusic-analytics.iam.gserviceaccount.com

      - name: OpenTofu Init
        run: tofu init -backend-config="profile="

      - name: OpenTofu Apply
        run: tofu apply -auto-approve -input=false
        env:
          TF_VAR_github_token:          ${{ secrets.GH_TOKEN_AMPLIFY }}
          TF_VAR_listmonk_username:     ${{ secrets.LISTMONK_USERNAME }}
          TF_VAR_listmonk_password:     ${{ secrets.LISTMONK_PASSWORD }}
          TF_VAR_db_username:           ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:           ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_resend_api_key:        ${{ secrets.RESEND_API_KEY }}
          TF_VAR_clerk_secret_key:      ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TF_VAR_cloudflare_api_token:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_google_project_id:     project-bb73c742-70e6-4419-a66
          TF_VAR_google_org_id:         "982527051911"
