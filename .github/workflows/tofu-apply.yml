name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  contents: read
  id-token: write  # required for Google Workload Identity Federation

# Shares the same concurrency group as deploy.yml so tofu-apply and deploy
# never run simultaneously. If both fire on the same push (infra + app changes),
# tofu-apply runs first (instance type change, etc.), then deploy SSH runs safely.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  tofu-apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infrastructure
    # Job-level env so all steps (init, import, apply) share the same vars
    env:
      TF_VAR_github_token:          ${{ secrets.GH_TOKEN_AMPLIFY }}
      TF_VAR_listmonk_username:     ${{ secrets.LISTMONK_USERNAME }}
      TF_VAR_listmonk_password:     ${{ secrets.LISTMONK_PASSWORD }}
      TF_VAR_db_username:           ${{ secrets.POSTGRES_USER }}
      TF_VAR_db_password:           ${{ secrets.POSTGRES_PASSWORD }}
      TF_VAR_resend_api_key:        ${{ secrets.RESEND_API_KEY }}
      TF_VAR_clerk_secret_key:      ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      TF_VAR_cloudflare_api_token:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_google_project_id:     ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_google_org_id:         ${{ secrets.GCP_ORG_ID }}
      TF_VAR_ig_user_id:            ${{ secrets.IG_USER_ID }}
      TF_VAR_ig_access_token:       ${{ secrets.IG_ACCESS_TOKEN }}
      TF_VAR_fb_page_id:            ${{ secrets.FB_PAGE_ID }}
      TF_VAR_fb_access_token:       ${{ secrets.FB_ACCESS_TOKEN }}
      TF_VAR_youtube_api_key:       ${{ secrets.YOUTUBE_API_KEY }}
      TF_VAR_anthropic_api_key:                  ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_n8n_artist_enrichment_webhook_url:  ${{ secrets.N8N_ARTIST_ENRICHMENT_WEBHOOK_URL }}
      TF_VAR_n8n_webhook_secret:                 ${{ secrets.N8N_WEBHOOK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '~1.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1082906683227/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: spm-ci-planner@stpetemusic-analytics.iam.gserviceaccount.com

      - name: OpenTofu Init
        run: tofu init -backend-config="profile="

      # Import GCP resources that exist in GCP but may not yet be in Terraform state.
      # Idempotent: skips resources already tracked. continue-on-error so a permission
      # miss during bootstrap doesn't block the apply from attempting.
      # Once google_project_iam_member.ci_service_usage_admin is bootstrapped locally,
      # spm-ci-planner gains serviceusage.services.get and these imports succeed permanently.
      - name: Import unmanaged GCP resources into state
        continue-on-error: true
        run: |
          tofu state list | grep -qF 'google_project_service.sheets_api[0]' || \
            tofu import -input=false 'google_project_service.sheets_api[0]' \
              stpetemusic-analytics/sheets.googleapis.com

          tofu state list | grep -qF 'google_iam_workload_identity_pool.github_actions[0]' || \
            tofu import -input=false 'google_iam_workload_identity_pool.github_actions[0]' \
              projects/stpetemusic-analytics/locations/global/workloadIdentityPools/github-actions

          tofu state list | grep -qF 'google_iam_workload_identity_pool_provider.github[0]' || \
            tofu import -input=false 'google_iam_workload_identity_pool_provider.github[0]' \
              projects/stpetemusic-analytics/locations/global/workloadIdentityPools/github-actions/providers/github

      - name: OpenTofu Apply
        run: tofu apply -auto-approve -input=false
