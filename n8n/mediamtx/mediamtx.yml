# MediaMTX — RTMP ingest + recording only
# YouTube handles live delivery to viewers; this server saves the .mp4 for post-processing.
# OBS → Restream → this server (records) + YouTube (streams to viewers)

rtmpAddress: :1935

# HLS/RTSP/WebRTC not needed — disable to reduce attack surface and memory
hlsAddress: ""
rtspAddress: ""
rtspsAddress: ""
webrtcAddress: ""
srtAddress: ""

# Only allow publishing with the correct stream key (set via RTMP_STREAM_KEY env var at runtime)
authMethod: internal
authInternalUsers:
  - user: stream
    pass: "${RTMP_STREAM_KEY}"
    permissions:
      - action: publish
        path: live

# Record every published stream as a single .mp4 (OBS encodes; we just remux)
record: yes
recordPath: /recordings/%path/%Y-%m-%dT%H-%M-%S.mp4
recordFormat: fmp4
recordDeleteAfter: 0s   # vod-watcher.service uploads to S3 and handles cleanup

paths:
  live:
    source: publisher
