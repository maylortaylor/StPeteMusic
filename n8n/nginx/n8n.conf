server {
    listen 80;
    server_name n8n.stpetemusic.live;

    # Required for certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HLS live stream relay — MediaMTX serves segments/manifests on :8888
    # CloudFront uses https://n8n.stpetemusic.live/hls as its origin.
    # Trailing slash on proxy_pass strips the /hls/ prefix before passing to MediaMTX.
    location /hls/ {
        proxy_pass http://127.0.0.1:8888/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=2";
    }

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        # WebSocket support — required for n8n live UI updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }
}
