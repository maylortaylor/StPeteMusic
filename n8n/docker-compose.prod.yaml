services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3       # 3 retries = max 150s to healthy (60s start + 3×30s); deploy waits 300s
      start_period: 60s
    environment:
      - N8N_HOST=n8n.stpetemusic.live
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.stpetemusic.live/
      - GENERIC_TIMEZONE=America/New_York
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OBSIDIAN_HOST=${OBSIDIAN_HOST}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
      - N8N_LOG_LEVEL=info
      - N8N_API_KEY=${N8N_API_KEY}
      - ADMIN_ENRICHMENT_CALLBACK_URL=${ADMIN_ENRICHMENT_CALLBACK_URL}
      - ADMIN_ARTIST_ENRICHMENT_CALLBACK_URL=${ADMIN_ARTIST_ENRICHMENT_CALLBACK_URL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - CLAUDE_API_KEY_N8N_STPETEMUSIC=${CLAUDE_API_KEY_N8N_STPETEMUSIC}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - N8N_GEMINI_API_KEY=${N8N_GEMINI_API_KEY}
      - IG_USER_ID=${IG_USER_ID}
      - IG_ACCESS_TOKEN=${IG_ACCESS_TOKEN}
      - FB_PAGE_ID=${FB_PAGE_ID}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - NODE_OPTIONS=--max-old-space-size=768
      - POSTGRES_HOST=${RDS_HOST}
      - POSTGRES_DB=n8n
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    ports:
      # Bound to localhost only — nginx proxies external traffic
      - "127.0.0.1:5678:5678"
    networks:
      - n8n-net
    mem_limit: 1024m
    memswap_limit: 2048m

  listmonk:
    image: listmonk/listmonk:latest
    container_name: stpetemusic-listmonk
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_db__host=${RDS_HOST}
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=${POSTGRES_USER}
      - LISTMONK_db__password=${POSTGRES_PASSWORD}
      - LISTMONK_db__database=listmonk_stpetemusic
      - LISTMONK_db__ssl_mode=require
    # echo y answers the "continue (y/N)?" prompt on first install (no TTY in Docker).
    # --idempotent skips install entirely if tables already exist — safe on every restart.
    command: [sh, -c, 'echo y | ./listmonk --install --idempotent && ./listmonk']
    ports:
      # Bound to localhost only — nginx proxies external traffic
      - "127.0.0.1:9000:9000"
    networks:
      - n8n-net
    volumes:
      - listmonk_uploads:/listmonk/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    mem_limit: 256m
    memswap_limit: 512m

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: stpetemusic-mediamtx
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - RTMP_STREAM_KEY=${RTMP_STREAM_KEY}
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings
    ports:
      # RTMP — must bind to 0.0.0.0 so Restream can connect from the internet
      - "0.0.0.0:1935:1935"
      # HLS — localhost only, nginx proxies to CloudFront origin
      - "127.0.0.1:8888:8888"
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 256m    # HLS segment buffering requires extra headroom
    memswap_limit: 512m

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=60
      - AUTOHEAL_START_PERIOD=300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  n8n-net:
    driver: bridge

volumes:
  n8n_data:
    driver: local
  listmonk_uploads:
    driver: local
  recordings:
    driver: local
