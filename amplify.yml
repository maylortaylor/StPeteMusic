version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm ci
        build:
          commands:
            - npm run build --workspace=apps/web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
    appRoot: apps/web
