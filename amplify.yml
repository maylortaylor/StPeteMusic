version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm ci
        build:
          commands:
            - npm run build
            # Copy public/ into .next/ so both land at the artifact root.
            # Amplify SSR requires required-server-files.json at artifact root
            # (hence baseDirectory: .next), and Next.js needs public/ at that
            # same root to serve static assets at runtime.
            - cp -r public .next/
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            # Use --prefix to run npm from the repo root without changing shell CWD.
            # Keeps build phase CWD at apps/admin so 'npm run build' = 'next build'.
            - npm --prefix ../.. ci
            - npm --prefix ../.. run build --workspace=@stpetemusic/db
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/admin
