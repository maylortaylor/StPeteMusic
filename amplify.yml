version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm ci
        build:
          commands:
            - npm run build
            # Copy public/ into .next/ so both land at the artifact root.
            # Amplify SSR requires required-server-files.json at artifact root
            # (hence baseDirectory: .next), and Next.js needs public/ at that
            # same root to serve static assets at runtime.
            - cp -r public .next/
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            # Install from the monorepo root so all workspace deps (drizzle-orm, pg, etc.)
            # land in root node_modules and are resolvable by apps/admin
            - cd $CODEBUILD_SRC_DIR && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - $CODEBUILD_SRC_DIR/node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/admin
