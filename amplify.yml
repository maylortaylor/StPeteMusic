version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # baseDirectory is relative to appRoot (apps/web)
        baseDirectory: .
        files:
          - .next/**/*
          - public/**/*
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
